name: Build og Deploy til Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Kør tests
        run: dotnet test tests/DA.ServiceHistorik.Tests --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish src/DA.ServiceHistorik.Api/DA.ServiceHistorik.Api.csproj --configuration Release --output ./publish

      - name: Deploy til Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish
